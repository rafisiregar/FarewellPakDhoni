<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tebak Wajah Pahlawan · Puzzle Challenge</title>
  <style>
    /* ========== CSS DESAIN MEWAH ========== */
    * {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap');

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(145deg, #0a0f2a 0%, #0a1628 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      padding: 20px;
    }

    #tebak-root {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      background: rgba(10, 22, 40, 0.95);
      border-radius: 56px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 200, 100, 0.15);
    }

    .ray-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 40%, #1a3a6e 0%, #0a1628 90%);
      z-index: 0;
    }

    .rays {
      position: absolute;
      inset: 0;
      background-image: repeating-conic-gradient(#1e4080 0deg 5deg, transparent 5deg 10deg);
      opacity: 0.15;
      z-index: 0;
    }

    .screen {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 32px 40px;
      min-height: 680px;
    }

    /* TYPOGRAPHY & BUTTONS */
    h1 { font-family: 'Bangers', cursive; font-size: 68px; color: #fff; text-shadow: 4px 4px 0 #e63946; margin-bottom: 10px; }
    p { color: #b8d4ff; font-size: 18px; margin-bottom: 30px; font-weight: 600; }

    .btn-start, .btn-restart, .next-question-btn {
      background: linear-gradient(135deg, #1e90ff, #0066cc);
      color: #fff; border: none; border-radius: 80px; padding: 18px 58px;
      font-family: 'Bangers', cursive; font-size: 30px; cursor: pointer;
      box-shadow: 0 8px 0 #0a4d8a; transition: 0.1s;
    }
    .btn-start:active, .next-question-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #0a4d8a; }

    /* PUZZLE STYLE */
    .puzzle-header { width: 100%; max-width: 750px; display: flex; justify-content: space-between; margin-bottom: 20px; }
    .timer { background: #0b1b38; padding: 8px 24px; border-radius: 60px; color: #f5c842; font-size: 32px; font-weight: 900; font-family: monospace; }
    .score { background: #0b1b38; padding: 8px 28px; border-radius: 60px; color: #fff; font-size: 26px; font-weight: 800; }
    
    .tile-grid-wrap { background: #070f22; border-radius: 32px; padding: 16px; box-shadow: inset 0 2px 8px #000; }
    .tile-grid { display: grid; gap: 2px; background: #0f1e3a; margin: 0 auto; }
    .tile { position: relative; overflow: hidden; background: #152a4e; border-radius: 4px; }
    .tile .cover { position: absolute; inset: 0; background: linear-gradient(145deg, #1f3d6e, #152a50); transition: opacity 0.3s; z-index: 2; }
    .tile img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .action-panel { display: flex; gap: 20px; margin-top: 25px; }
    .stop-puzzle-btn, .resume-puzzle-btn, .buzz-btn {
      padding: 12px 30px; border-radius: 50px; border: none; font-family: 'Bangers'; font-size: 22px; cursor: pointer;
    }
    .stop-puzzle-btn { background: #f4a261; box-shadow: 0 5px 0 #b95f1a; }
    .resume-puzzle-btn { background: #2ecc71; box-shadow: 0 5px 0 #1f8a4c; }
    .buzz-btn { background: #e63946; color: white; box-shadow: 0 5px 0 #8b0000; }

    /* CHOICES STYLE */
    .choices-grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin: 20px 0; }
    .choice-card { background: #0e1f3e; border: 3px solid #f5c842; border-radius: 30px; cursor: pointer; padding: 15px; width: 220px; text-align: center; transition: 0.2s; }
    .choice-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 20px; margin: 10px 0; border: 2px solid #ffd966; }
    .choice-letter { font-family: 'Bangers'; font-size: 30px; color: #f5c842; }
    .choice-name { color: white; font-weight: 900; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 10px; }
    
    .correct-feedback { background: #1a6e2e !important; border-color: #a0ffb0 !important; }
    .wrong-feedback { background: #6e1a1a !important; border-color: #ff7b7b !important; }

    .result-screen { text-align: center; }
    .trophy { font-size: 80px; }
  </style>
</head>
<body>

<div id="tebak-root">
  <div class="ray-bg"></div>
  <div class="rays"></div>
  <div class="screen" id="app">
    </div>
</div>

<script>
  (function() {
    let QUESTIONS = []; 

    const COLS = 8;
    const ROWS = 6;
    const TOTAL_TILES = COLS * ROWS;
    const REVEAL_INTERVAL_MS = 550;
    const MAX_TIME = 30;

    let currentMode = 'start';
    let currentQIndex = 0;
    let totalScore = 0;
    let puzzleInterval = null;
    let timerInterval = null;
    let timeLeft = MAX_TIME;
    let isPaused = false;
    let currentRevealStep = 0;
    let tileOrder = [];
    let currentQuestionObj = null;
    let allTilesRevealed = false;
    let waitingForNext = false;
    
    const appContainer = document.getElementById('app');

    // AMBIL DATA DARI JSON
    fetch('data.json')
      .then(res => res.json())
      .then(data => {
        QUESTIONS = data;
        renderStartScreen();
      })
      .catch(err => {
        appContainer.innerHTML = `<h2 style="color:white">Gagal memuat data.json</h2>`;
        console.error(err);
      });

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function stopAllPuzzleTimers() {
      if (puzzleInterval) { clearInterval(puzzleInterval); puzzleInterval = null; }
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    function forceRevealAllTiles() {
      for (let i = 0; i < TOTAL_TILES; i++) {
        const cover = document.getElementById(`puzzle-cover-${i}`);
        if (cover) cover.style.opacity = '0';
      }
    }

    function resumePuzzle() {
      if (currentMode !== 'puzzle' || !isPaused) return;
      isPaused = false;
      startRevealSequence();
      startTimer();
      updatePuzzleButtonsUI();
    }

    function pausePuzzle() {
      if (currentMode !== 'puzzle' || isPaused) return;
      isPaused = true;
      stopAllPuzzleTimers();
      updatePuzzleButtonsUI();
      document.getElementById('puzzle-progress').innerText = '⏸️ PAUSED';
    }

    function buzzToChoices() {
      if (currentMode !== 'puzzle') return;
      stopAllPuzzleTimers();
      forceRevealAllTiles();
      goToChoicesPage("buzz");
    }

    function updatePuzzleButtonsUI() {
      const stopBtn = document.getElementById('stopActionBtn');
      const resumeBtn = document.getElementById('resumeActionBtn');
      if (isPaused) {
        if (stopBtn) stopBtn.style.display = 'none';
        if (resumeBtn) resumeBtn.style.display = 'block';
      } else {
        if (stopBtn) stopBtn.style.display = 'block';
        if (resumeBtn) resumeBtn.style.display = 'none';
      }
    }

    function nextQuestion() {
      if (waitingForNext) return;
      waitingForNext = true;
      currentQIndex++;
      if (currentQIndex >= QUESTIONS.length) {
        renderResultScreen();
      } else {
        renderPuzzleScreen();
      }
      waitingForNext = false;
    }

    function goToChoicesPage(trigger = "stop") {
      currentMode = 'choices';
      stopAllPuzzleTimers();
      const qData = QUESTIONS[currentQIndex];
      const letters = ['A', 'B', 'C'];
      let choicesHtml = '';
      qData.choices.forEach((ch, idx) => {
        choicesHtml += `
          <div class="choice-card" data-choice-index="${idx}">
            <div class="choice-letter">${letters[idx]}</div>
            <img src="${ch.img}" onerror="this.src='https://placehold.co/300x260?text=Error'">
            <div class="choice-name">${ch.name}</div>
          </div>
        `;
      });
      
      let triggerText = trigger === "buzz" ? "🔔 BUZZ!" : (trigger === "timeout" ? "⏰ WAKTU HABIS!" : "✨ TERBUKA ✨");
      
      appContainer.innerHTML = `
        <div class="choices-page">
          <div class="choices-header">
            <span class="score">🏆 Skor: ${totalScore}</span>
          </div>
          <div style="text-align: center;">
            <h2 style="color:white; font-family:'Bangers'; font-size:40px;">SIAPAKAH DIA?</h2>
            <p style="color:#ffd966;">${triggerText}</p>
          </div>
          <div class="choices-grid">${choicesHtml}</div>
          <div style="display: flex; justify-content: center;">
            <button class="next-question-btn" id="nextQuestionBtn">➡️ LANJUT</button>
          </div>
        </div>
      `;

      document.getElementById('nextQuestionBtn').addEventListener('click', nextQuestion);
      
      document.querySelectorAll('.choice-card').forEach(card => {
        card.addEventListener('click', function() {
          const idx = parseInt(this.getAttribute('data-choice-index'));
          const isCorrect = (qData.choices[idx].name === qData.answer);
          if (isCorrect) totalScore++;
          
          document.querySelectorAll('.choice-card').forEach((c, i) => {
            c.style.pointerEvents = 'none';
            if (qData.choices[i].name === qData.answer) c.classList.add('correct-feedback');
            else if (i === idx) c.classList.add('wrong-feedback');
          });
        });
      });
    }

    function renderPuzzleScreen() {
      currentMode = 'puzzle';
      isPaused = false;
      allTilesRevealed = false;
      currentRevealStep = 0;
      timeLeft = MAX_TIME;
      currentQuestionObj = QUESTIONS[currentQIndex];
      tileOrder = shuffleArray(Array.from({ length: TOTAL_TILES }, (_, i) => i));
      
      appContainer.innerHTML = `
        <div class="puzzle-header">
          <span class="timer" id="puzzle-timer">0:30</span>
          <span class="score">🏆 ${totalScore}</span>
        </div>
        <div class="tile-grid-wrap"><div class="tile-grid" id="puzzle-grid"></div></div>
        <p id="puzzle-progress">Soal ${currentQIndex+1}/${QUESTIONS.length}</p>
        <div class="action-panel">
          <button class="stop-puzzle-btn" id="stopActionBtn">⏹️ STOP</button>
          <button class="resume-puzzle-btn" id="resumeActionBtn" style="display:none;">▶️ LANJUT</button>
          <button class="buzz-btn" id="buzzActionBtn">🔔 BUZZ!</button>
        </div>
      `;
      
      buildTileGrid(currentQuestionObj.img);
      document.getElementById('stopActionBtn').addEventListener('click', pausePuzzle);
      document.getElementById('resumeActionBtn').addEventListener('click', resumePuzzle);
      document.getElementById('buzzActionBtn').addEventListener('click', buzzToChoices);
      
      startRevealSequence();
      startTimer();
    }

    function buildTileGrid(imgSrc) {
      const grid = document.getElementById('puzzle-grid');
      const containerWidth = Math.min(600, window.innerWidth * 0.9);
      const tileSize = Math.floor(containerWidth / COLS);
      grid.style.gridTemplateColumns = `repeat(${COLS}, ${tileSize}px)`;
      
      for (let i = 0; i < TOTAL_TILES; i++) {
        const r = Math.floor(i / COLS);
        const c = i % COLS;
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.style.width = tile.style.height = `${tileSize}px`;
        tile.innerHTML = `
          <img src="${imgSrc}" style="object-position: ${(c/(COLS-1))*100}% ${(r/(ROWS-1))*100}%; width:${COLS*100}%; height:${ROWS*100}%; max-width:none; margin-left:-${c*100}%; margin-top:-${r*100}%;">
          <div class="cover" id="puzzle-cover-${i}"></div>
        `;
        grid.appendChild(tile);
      }
    }

    function startRevealSequence() {
      if (puzzleInterval) clearInterval(puzzleInterval);
      puzzleInterval = setInterval(() => {
        if (isPaused) return;
        if (currentRevealStep >= tileOrder.length) {
          stopAllPuzzleTimers();
          allTilesRevealed = true;
          goToChoicesPage("full");
          return;
        }
        const el = document.getElementById(`puzzle-cover-${tileOrder[currentRevealStep]}`);
        if(el) el.style.opacity = '0';
        currentRevealStep++;
      }, REVEAL_INTERVAL_MS);
    }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (isPaused) return;
        if (timeLeft <= 0) {
          stopAllPuzzleTimers();
          forceRevealAllTiles();
          goToChoicesPage("timeout");
          return;
        }
        timeLeft--;
        const timerSpan = document.getElementById('puzzle-timer');
        if (timerSpan) timerSpan.innerText = `0:${timeLeft < 10 ? '0' : ''}${timeLeft}`;
      }, 1000);
    }

    function renderResultScreen() {
      currentMode = 'result';
      appContainer.innerHTML = `
        <div class="result-screen">
          <div class="trophy">🏆</div>
          <h1>SELESAI!</h1>
          <p>Skor Akhir: ${totalScore} / ${QUESTIONS.length}</p>
          <button class="btn-restart" onclick="location.reload()">🔄 MAIN LAGI</button>
        </div>
      `;
    }

    function renderStartScreen() {
      appContainer.innerHTML = `
        <div class="start-screen">
          <h1>🎭 TEBAK WAJAH</h1>
          <p>Edisi Pahlawan Nasional</p>
          <button class="btn-start" id="startGameBtn">🚀 MULAI GAME</button>
        </div>
      `;
      document.getElementById('startGameBtn').addEventListener('click', renderPuzzleScreen);
    }

  })();
</script>
</body>
</html>
