<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tebak Wajah Pahlawan</title>
  <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/50/ffffff/user-shield.png">  <style>
    /* ========== CSS DESAIN MEWAH ====zpL====== */
    * {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap');

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(145deg, #0a0f2a 0%, #0a1628 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      padding: 20px;
    }

    #tebak-root {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(10, 22, 40, 0.95);
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6);
      border: 2px solid rgba(255, 215, 0, 0.2);
    }

    .screen {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      min-height: 600px;
    }

    h1 { font-family: 'Bangers', cursive; font-size: 60px; color: #fff; text-shadow: 4px 4px 0 #e63946; margin-bottom: 10px; text-align: center; }
    p { color: #b8d4ff; font-size: 18px; margin-bottom: 20px; font-weight: 600; text-align: center;}

    .btn-start, .btn-restart, .next-question-btn {
      background: linear-gradient(135deg, #ff9900, #ff5500);
      color: #fff; border: none; border-radius: 50px; padding: 15px 40px;
      font-family: 'Bangers', cursive; font-size: 28px; cursor: pointer;
      box-shadow: 0 6px 0 #993300; transition: 0.1s; margin-top: 20px;
    }
    .btn-start:active, .next-question-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #993300; }

    /* PUZZLE STYLE */
    .puzzle-header { width: 100%; display: flex; justify-content: space-between; margin-bottom: 15px; max-width: 600px;}
    .timer { background: #e63946; padding: 5px 20px; border-radius: 30px; color: #fff; font-size: 24px; font-weight: 900; }
    .score { background: #f5c842; padding: 5px 20px; border-radius: 30px; color: #000; font-size: 24px; font-weight: 800; }
    
    .tile-grid-wrap { background: #000; border-radius: 20px; padding: 10px; border: 4px solid #333; }
    .tile-grid { display: grid; gap: 1px; background: #222; margin: 0 auto; }
    .tile { position: relative; overflow: hidden; background: #111; }
    .tile .cover { position: absolute; inset: 0; background: #2c3e50; transition: opacity 0.3s; z-index: 2; border: 0.1px solid rgba(255,255,255,0.1); }
    .tile img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .action-panel { display: flex; gap: 15px; margin-top: 20px; }
    .stop-puzzle-btn, .resume-puzzle-btn, .buzz-btn {
      padding: 10px 25px; border-radius: 30px; border: none; font-family: 'Bangers'; font-size: 20px; cursor: pointer; color: white;
    }
    .stop-puzzle-btn { background: #f39c12; }
    .resume-puzzle-btn { background: #27ae60; }
    .buzz-btn { background: #c0392b; }

    /* CHOICES STYLE */
    .choices-grid { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin: 20px 0; }
    .choice-card { background: #162a47; border: 3px solid #34495e; border-radius: 20px; cursor: pointer; padding: 10px; width: 180px; text-align: center; transition: 0.3s; }
    .choice-card:hover { border-color: #f5c842; transform: scale(1.05); }
    .choice-card img { width: 100%; height: 130px; object-fit: cover; border-radius: 15px; margin-bottom: 10px; }
    .choice-name { color: white; font-weight: bold; font-size: 14px; }
    
    .correct-feedback { background: #27ae60 !important; border-color: #2ecc71 !important; }
    .wrong-feedback { background: #c0392b !important; border-color: #e74c3c !important; }

    .result-screen { text-align: center; color: white; }
  </style>
</head>
<body>

<div id="tebak-root">
  <div class="screen" id="app">
    </div>
</div>

<script>
  (function() {
    // DATA LANGSUNG DI SINI (TIDAK PERLU FETCH LAGI)
    const QUESTIONS = [
      {
        "answer": "Ir. Soekarno",
        "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/COLLECTIE_TROPENMUSEUM_Portretfoto_van_Soekarno_TMnr_10018503.jpg/440px-COLLECTIE_TROPENMUSEUM_Portretfoto_van_Soekarno_TMnr_10018503.jpg",
        "choices": [
          { "name": "Ir. Soekarno", "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/COLLECTIE_TROPENMUSEUM_Portretfoto_van_Soekarno_TMnr_10018503.jpg/440px-COLLECTIE_TROPENMUSEUM_Portretfoto_van_Soekarno_TMnr_10018503.jpg" },
          { "name": "Moh. Hatta", "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Mohammad_Hatta.jpg/440px-Mohammad_Hatta.jpg" },
          { "name": "Soeharto", "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Soeharto%2C_1993.jpg/440px-Soeharto%2C_1993.jpg" }
        ]
      },
      {
        "answer": "Moh. Hatta",
        "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Mohammad_Hatta.jpg/440px-Mohammad_Hatta.jpg",
        "choices": [
          { "name": "Ir. Soekarno", "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/COLLECTIE_TROPENMUSEUM_Portretfoto_van_Soekarno_TMnr_10018503.jpg/440px-COLLECTIE_TROPENMUSEUM_Portretfoto_van_Soekarno_TMnr_10018503.jpg" },
          { "name": "Moh. Hatta", "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Mohammad_Hatta.jpg/440px-Mohammad_Hatta.jpg" },
          { "name": "B.J. Habibie", "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/Habibie_Bacharuddin_Jusuf.jpg/440px-Habibie_Bacharuddin_Jusuf.jpg" }
        ]
      },
      {
        "answer": "Soeharto",
        "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Soeharto%2C_1993.jpg/440px-Soeharto%2C_1993.jpg",
        "choices": [
          { "name": "Soeharto", "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Soeharto%2C_1993.jpg/440px-Soeharto%2C_1993.jpg" },
          { "name": "B.J. Habibie", "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/Habibie_Bacharuddin_Jusuf.jpg/440px-Habibie_Bacharuddin_Jusuf.jpg" },
          { "name": "Moh. Hatta", "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Mohammad_Hatta.jpg/440px-Mohammad_Hatta.jpg" }
        ]
      },
      {
        "answer": "B.J. Habibie",
        "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/Habibie_Bacharuddin_Jusuf.jpg/440px-Habibie_Bacharuddin_Jusuf.jpg",
        "choices": [
          { "name": "Ir. Soekarno", "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/COLLECTIE_TROPENMUSEUM_Portretfoto_van_Soekarno_TMnr_10018503.jpg/440px-COLLECTIE_TROPENMUSEUM_Portretfoto_van_Soekarno_TMnr_10018503.jpg" },
          { "name": "B.J. Habibie", "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/Habibie_Bacharuddin_Jusuf.jpg/440px-Habibie_Bacharuddin_Jusuf.jpg" },
          { "name": "Soeharto", "img": "https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Soeharto%2C_1993.jpg/440px-Soeharto%2C_1993.jpg" }
        ]
      }
    ];

    const COLS = 8;
    const ROWS = 6;
    const TOTAL_TILES = COLS * ROWS;
    const REVEAL_INTERVAL_MS = 500;
    const MAX_TIME = 30;

    let currentQIndex = 0;
    let totalScore = 0;
    let puzzleInterval = null;
    let timerInterval = null;
    let timeLeft = MAX_TIME;
    let isPaused = false;
    let currentRevealStep = 0;
    let tileOrder = [];
    
    const appContainer = document.getElementById('app');

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function stopAllTimers() {
      clearInterval(puzzleInterval);
      clearInterval(timerInterval);
    }

    function renderStartScreen() {
      appContainer.innerHTML = `
        <h1>🎭 TEBAK WAJAH</h1>
        <p>Bisakah kamu menelebak Pahlawan Nasional sebelum puzzle terbuka semua?</p>
        <button class="btn-start" id="startBtn">MULAI GAME</button>
      `;
      document.getElementById('startBtn').onclick = renderPuzzleScreen;
    }

    function renderPuzzleScreen() {
      isPaused = false;
      currentRevealStep = 0;
      timeLeft = MAX_TIME;
      tileOrder = shuffleArray(Array.from({ length: TOTAL_TILES }, (_, i) => i));
      
      appContainer.innerHTML = `
        <div class="puzzle-header">
          <div class="timer" id="timer">0:${timeLeft}</div>
          <div class="score">🏆 ${totalScore}</div>
        </div>
        <div class="tile-grid-wrap"><div class="tile-grid" id="grid"></div></div>
        <div class="action-panel">
          <button class="stop-puzzle-btn" id="pauseBtn">⏸ STOP</button>
          <button class="resume-puzzle-btn" id="resumeBtn" style="display:none">▶ LANJUT</button>
          <button class="buzz-btn" id="buzzBtn">🔔 JAWAB!</button>
        </div>
      `;
      
      const grid = document.getElementById('grid');
      const containerWidth = Math.min(500, window.innerWidth * 0.85);
      const tileSize = Math.floor(containerWidth / COLS);
      grid.style.gridTemplateColumns = `repeat(${COLS}, ${tileSize}px)`;
      
      const q = QUESTIONS[currentQIndex];
      for (let i = 0; i < TOTAL_TILES; i++) {
        const r = Math.floor(i / COLS);
        const c = i % COLS;
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.style.width = tile.style.height = `${tileSize}px`;
        tile.innerHTML = `
          <img src="${q.img}" style="object-position: ${(c/(COLS-1))*100}% ${(r/(ROWS-1))*100}%; width:${COLS*100}%; height:${ROWS*100}%; max-width:none; margin-left:-${c*100}%; margin-top:-${r*100}%;">
          <div class="cover" id="cover-${i}"></div>
        `;
        grid.appendChild(tile);
      }

      document.getElementById('pauseBtn').onclick = () => { isPaused = true; updateBtns(true); };
      document.getElementById('resumeBtn').onclick = () => { isPaused = false; updateBtns(false); };
      document.getElementById('buzzBtn').onclick = () => goToChoices("buzz");

      function updateBtns(p) {
        document.getElementById('pauseBtn').style.display = p ? 'none' : 'block';
        document.getElementById('resumeBtn').style.display = p ? 'block' : 'none';
      }

      startFlow();
    }

    function startFlow() {
      puzzleInterval = setInterval(() => {
        if (isPaused) return;
        if (currentRevealStep >= TOTAL_TILES) return goToChoices("full");
        document.getElementById(`cover-${tileOrder[currentRevealStep]}`).style.opacity = '0';
        currentRevealStep++;
      }, REVEAL_INTERVAL_MS);

      timerInterval = setInterval(() => {
        if (isPaused) return;
        timeLeft--;
        document.getElementById('timer').innerText = `0:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
        if (timeLeft <= 0) goToChoices("timeout");
      }, 1000);
    }

    function goToChoices(mode) {
      stopAllTimers();
      const q = QUESTIONS[currentQIndex];
      
      appContainer.innerHTML = `
        <h2 style="color:white; margin-bottom:20px;">SIAPA TOKOH INI?</h2>
        <div class="choices-grid" id="choices"></div>
        <button class="next-question-btn" id="nextBtn" style="display:none">SOAL BERIKUTNYA ➡️</button>
      `;

      const choiceBox = document.getElementById('choices');
      q.choices.forEach(c => {
        const div = document.createElement('div');
        div.className = 'choice-card';
        div.innerHTML = `<img src="${c.img}"><div class="choice-name">${c.name}</div>`;
        div.onclick = () => {
          if(document.querySelector('.correct-feedback')) return;
          if(c.name === q.answer) {
            div.classList.add('correct-feedback');
            totalScore++;
          } else {
            div.classList.add('wrong-feedback');
            // Tunjukkan yang benar
            Array.from(choiceBox.children).forEach(child => {
              if(child.innerText === q.answer) child.classList.add('correct-feedback');
            });
          }
          document.getElementById('nextBtn').style.display = 'block';
        };
        choiceBox.appendChild(div);
      });

      document.getElementById('nextBtn').onclick = () => {
        currentQIndex++;
        if(currentQIndex < QUESTIONS.length) renderPuzzleScreen();
        else renderResult();
      };
    }

    function renderResult() {
      appContainer.innerHTML = `
        <div class="result-screen">
          <h1 style="font-size:80px;">🏆</h1>
          <h1>QUIZ SELESAI!</h1>
          <p>Skor Kamu: ${totalScore} dari ${QUESTIONS.length}</p>
          <button class="btn-restart" onclick="location.reload()">ULANGI GAME</button>
        </div>
      `;
    }

    renderStartScreen();
  })();
</script>
</body>
</html>
