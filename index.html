<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tebak Pahlawan</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        img { border-radius: 10px; margin-bottom: 20px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 5px; border: 1px solid #ddd; background: white; transition: 0.3s; }
        button:hover { background: #e0e0e0; }
        .btn-start { background: #007bff; color: white; border: none; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="app" class="card">
    <p>Memuat game...</p>
</div>

<script>
let QUESTIONS = [];
let currentQIndex = 0;
let totalScore = 0;

// REVISI: Ambil data dari file .json (BUKAN .php)
fetch('data.json')
  .then(res => {
      if (!res.ok) throw new Error("Gagal mengambil data.json");
      return res.json();
  })
  .then(data => {
    QUESTIONS = data;
    renderStartScreen();
  })
  .catch(err => {
      document.getElementById('app').innerHTML = `<p style="color:red">${err.message}</p>`;
  });

function renderStartScreen() {
  document.getElementById('app').innerHTML = `
    <h1>🎭 TEBAK PAHLAWAN</h1>
    <p>Uji pengetahuanmu tentang pahlawan nasional!</p>
    <button class="btn-start" onclick="startGame()">MULAI GAME</button>
  `;
}

function startGame() {
  currentQIndex = 0;
  totalScore = 0;
  renderQuestion();
}

function renderQuestion() {
  let q = QUESTIONS[currentQIndex];
  let html = `
    <p>Soal ${currentQIndex + 1} dari ${QUESTIONS.length}</p>
    <h2>Siapakah Tokoh Ini?</h2>
    <img src="${q.img}" width="250" onerror="this.src='https://placehold.co/250x250?text=Gambar+Hilang'">
    <br>
  `;

  q.choices.forEach((c) => {
    html += `<button onclick="answer('${c.name}')">${c.name}</button><br>`;
  });

  document.getElementById('app').innerHTML = html;
}

function answer(selectedName) {
  let correct = QUESTIONS[currentQIndex].answer;

  if (selectedName === correct) {
    totalScore++;
    alert("✅ BENAR!");
  } else {
    alert("❌ SALAH! Jawabannya adalah: " + correct);
  }

  currentQIndex++;
  if (currentQIndex >= QUESTIONS.length) {
    renderResult();
  } else {
    renderQuestion();
  }
}

function renderResult() {
  document.getElementById('app').innerHTML = `
    <h2>🎉 SELESAI!</h2>
    <p>Skor Akhir Anda:</p>
    <h1 style="font-size: 3rem;">${totalScore} / ${QUESTIONS.length}</h1>
    <button class="btn-start" onclick="startGame()">MAIN LAGI</button>
  `;
}
</script>

</body>
</html>
